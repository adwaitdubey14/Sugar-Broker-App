
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ankit Brokers | Delivery Order</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dynamic-row { display: flex; align-items: flex-end; gap: 10px; background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .row-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex-grow: 1; }
        .remove-btn { background: #ef4444; color: white; border: none; width: 35px; height: 35px; border-radius: 6px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 600px) { .row-inputs { grid-template-columns: repeat(2, 1fr); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">Delivery Order System - ANKIT BROKERS</div>
    <div class="nav">
        <button id="formBtn" class="active" onclick="showForm()">New Entry</button>
        <button id="tableBtn" onclick="showTable()">Records</button>
    </div>

    <div class="container">
        <!-- FORM SECTION -->
        <div id="formSection">
            <div class="card">
                <h3>Order Reference</h3>
                <div class="form-grid">
                    <div class="label-group"><label>DO. NO</label><input id="doNumber" placeholder="Enter DO. Number"></div>
                    <div class="label-group"><label>Mill Name (MD)</label><input id="md" placeholder="Enter Mill Name"></div>
                    <div class="label-group"><label>Order Date</label><input type="date" id="date"></div>
                    <div class="label-group"><label>Tender Date</label><input type="date" id="tenderDate"></div>
                </div>
            </div>

            <div class="card">
                <h3>Bill To</h3>
                <div class="form-grid">
                    <input id="billName" placeholder="Name">
                    <input id="billPlace" placeholder="Address">
                    <input id="billCity" placeholder="City">
                    <input id="billGST" placeholder="GSTIN" class="gst-input">
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin:0; border:none;">Shipped To</h3>
                    <button type="button" onclick="copyBilling()" style="background:#0ea5e9; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Same as Bill To</button>
                </div>
                <div class="form-grid">
                    <input id="shipName" placeholder="Name">
                    <input id="shipPlace" placeholder="Address">
                    <input id="shipCity" placeholder="City"> 
                    <input id="shipGST" placeholder="GSTIN" class="gst-input">
                </div>
            </div>

            <div class="card">
                <h3>Order Details (Grades)</h3>
                <div id="gradeContainer"></div>
                <button class="btn btn-primary" type="button" onclick="addGradeRow()">+ Add Row</button>
                <div class="form-grid" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                    <div class="label-group"><label>Vehicle No</label><input id="vehicle" placeholder="Enter Vehicle Number"></div>
                    <div class="label-group"><label>Total (Inc. 5% GST)</label><input id="total" placeholder="0.00" readonly></div>
                </div>
            </div>

            <div class="card">
                <h3>Payment Details (UTR)</h3>
                <div id="utrContainer"></div> 
                <button class="btn btn-primary" type="button" onclick="addUTRRow()">+ Add Payment Row</button>
            </div>

            <div class="action-footer">
                <button class="btn btn-success" onclick="saveData()">Save Record</button>
                <button class="btn btn-primary" onclick="generatePDF()">Generate PDF</button>
                <button class="btn btn-danger" onclick="resetForm()">Reset Form</button>
            </div>
        </div>

        <!-- TABLE SECTION -->
        <div id="tableSection" class="hidden">
            <div class="card"><input type="text" id="searchInput" placeholder="🔍 Search records by name..."></div>
            <div class="card">
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Mill</th>
                                <th>Party Name</th>
                                <th>Vehicle</th>
                                <th>Total</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
