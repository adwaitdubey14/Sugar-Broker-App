<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery Order System | ANKIT BROKERS</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div class="header">Delivery Order System - ANKIT BROKERS</div>
    <div class="nav">
        <button id="formBtn" class="active" onclick="showForm()">New Entry</button>
        <button id="tableBtn" onclick="showTable()">Records</button>
    </div>

    <div class="container">
        <div id="formSection">
            <div class="card">
                <h3>Basic Details</h3>
                <div class="form-grid">
                    <div class="label-group">
                        <label>Order Date</label>
                        <input type="date" id="date">
                    </div>
                    <div class="label-group">
                        <label>Managing Director</label>
                        <input id="md" placeholder="Enter Name">
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Bill To</h3>
                <div class="form-grid">
                    <input id="billName" placeholder="Name">
                    <input id="billPlace" placeholder="Address">
                    <input id="billCity" placeholder="City">
                    <input id="billGST" placeholder="GSTIN" class="gst-input">
                </div>
            </div>

            <div class="card">
                <h3>Shipped To</h3>
                <div class="form-grid">
                    <input id="shipName" placeholder="Name">
                    <input id="shipPlace" placeholder="Address">
                    <input id="shipCity" placeholder="City"> 
                    <input id="shipGST" placeholder="GSTIN" class="gst-input">
                </div>
            </div>

            <div class="card">
                <h3>Order Details</h3>
                <div class="form-grid">
                    <input type="number" id="quantity" placeholder="Quantity (Bags)">
                    <input id="grade" placeholder="Grade">
                    <input type="number" id="rate" placeholder="Rate">
                    <input id="vehicle" placeholder="Vehicle No">
                </div>
                <div class="total-section">
                    <label>Total Amount</label>
                    <input id="total" placeholder="Total" readonly>
                </div>
            </div>

            <div class="card">
                <h3>Payment Details (UTR)</h3>
                <div id="utrContainer"></div> 
                <button class="btn btn-primary" type="button" onclick="addUTRRow()" style="width: auto; margin-top: 10px;">+ Add Payment Row</button>
            </div>

            <div class="card">
                <h3>Additional</h3>
                <div class="additional-box">
                    <input id="transportId" placeholder="Transport ID">
                    <textarea id="note" placeholder="Any extra notes..."></textarea>
                </div>
            </div>

            <div class="action-footer">
                <button class="btn btn-success" onclick="saveData()">Save Record</button>
                <button class="btn btn-primary" onclick="generatePDF()">Generate PDF</button>
                <button class="btn btn-danger" onclick="resetForm()">Reset Form</button>
            </div>
        </div>

        <div id="tableSection" class="hidden">
            <div class="card" style="margin-bottom: 15px;">
                <input type="text" id="searchInput" placeholder="🔍 Search by Client Name..." 
                       style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px;">
            </div>
            
            <div class="card">
                <h3>Saved Records</h3>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>MD</th>
                                <th>Party Name</th>
                                <th>Qty</th>
                                <th>Rate</th>
                                <th>Total</th>
                                <th class="sticky-col">Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function showForm() {
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('tableSection').classList.add('hidden');
            document.getElementById('formBtn').classList.add('active');
            document.getElementById('tableBtn').classList.remove('active');
        }
        function showTable() {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('tableSection').classList.remove('hidden');
            document.getElementById('tableBtn').classList.add('active');
            document.getElementById('formBtn').classList.remove('active');
        }
    </script>
</body>
</html>
